<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contato</title>
<link rel="stylesheet" href="estilo.css">
</head>

<body>
<div class="container">    

<header>
<h1>Contato</h1>
</header>

<nav>
<ul>
<li><a href="index.html">Início</a></li>
<li><a href="destinos.html">Destinos</a></li>
<li><a href="pacotes.html">Pacotes</a></li>
<li><a href="galeria.html">Galeria</a></li>
<li><a href="contato.html">Contato</a></li>
</ul>
</nav>

<main>

<form>

<div>
<label for="nome">Nome:</label>
<input type="text" id="nome" required>
</div>

<div>
<label for="idade">Idade:</label>
<input type="number" id="idade">
</div>

<div>
<label for="data">Data da viagem:</label>
<input type="date" id="data">
</div>

<div>
<label for="destino">Destino:</label>
<select id="destino">
<option>Bonito</option>
<option>Jardim</option>
<option>Bodoquena</option>
</select>
</div>

<div>
<p>Hospedagem:</p>

<input type="radio" id="sim" name="hotel">
<label for="sim">Com hotel</label>

<input type="radio" id="nao" name="hotel">
<label for="nao">Sem hotel</label>
</div>

<div>
<input type="checkbox" id="seguro">
<label for="seguro">Desejo seguro viagem</label>
</div>

<div>
<label for="obs">Observações:</label>
<textarea id="obs" rows="5"></textarea>
</div>

<button type="submit">Enviar</button>

</form>

</main>

<footer>
<p>© 2026 Agência Boa Viagem</p>
</footer>

</div>
</body>
</html>
